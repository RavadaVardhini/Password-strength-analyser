<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Password Strength Analyzer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0b0b18;
      --card:     rgba(255,255,255,0.03);
      --border:   rgba(0,229,255,0.15);
      --cyan:     #00e5ff;
      --green:    #00c897;
      --weak:     #ff3b5c;
      --fair:     #ff8c42;
      --good:     #f5c800;
      --strong:   #00c897;
      --excel:    #00e5ff;
      --font:     'Share Tech Mono', monospace;
      --head:     'Orbitron', monospace;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      font-family: var(--font);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      overflow-x: hidden;
    }

    /* grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .wrapper {
      width: 100%;
      max-width: 560px;
      position: relative;
      z-index: 1;
    }

    /* ── Header ── */
    header { text-align: center; margin-bottom: 32px; }
    .subtitle {
      font-size: 11px;
      color: var(--cyan);
      letter-spacing: 6px;
      text-transform: uppercase;
      opacity: 0.7;
      margin-bottom: 10px;
    }
    h1 {
      font-family: var(--head);
      font-size: clamp(20px, 5vw, 32px);
      font-weight: 900;
      color: #e8e8f0;
      letter-spacing: -1px;
      line-height: 1.1;
    }
    h1 span { color: var(--cyan); font-style: italic; }
    .divider {
      width: 48px; height: 2px;
      background: var(--cyan);
      margin: 12px auto 0;
    }

    /* ── Card ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 2px;
      padding: 28px 24px;
      box-shadow: 0 0 40px rgba(0,229,255,0.05);
    }

    /* ── Input ── */
    .input-label {
      font-size: 10px;
      color: var(--cyan);
      letter-spacing: 3px;
      display: block;
      margin-bottom: 8px;
      opacity: 0.8;
    }
    .input-wrap { position: relative; margin-bottom: 24px; }
    #pwd {
      width: 100%;
      background: rgba(0,0,0,0.5);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2px;
      color: #e8e8f0;
      font-size: 16px;
      font-family: var(--font);
      padding: 14px 48px 14px 16px;
      outline: none;
      letter-spacing: 3px;
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    #pwd:focus {
      border-color: rgba(0,229,255,0.5);
      box-shadow: 0 0 0 2px rgba(0,229,255,0.08);
    }
    #pwd::placeholder { color: rgba(255,255,255,0.15); letter-spacing: 1px; }
    #toggleBtn {
      position: absolute; right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer; color: var(--cyan);
      font-size: 18px; opacity: 0.7;
      padding: 4px;
    }

    /* ── Strength Bar ── */
    .bar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    .bar-title { font-size: 10px; color: rgba(255,255,255,0.4); letter-spacing: 3px; }
    #strengthLabel { font-size: 12px; font-weight: 700; letter-spacing: 2px; color: #555; }
    .bar-track {
      height: 6px;
      background: rgba(255,255,255,0.06);
      border-radius: 1px;
      overflow: hidden;
    }
    #barFill {
      height: 100%;
      width: 0%;
      background: #555;
      border-radius: 1px;
      transition: width 0.5s cubic-bezier(.4,0,.2,1), background 0.5s;
    }
    .segments {
      display: flex; gap: 4px; margin-top: 6px; margin-bottom: 24px;
    }
    .seg {
      flex: 1; height: 2px; border-radius: 1px;
      background: rgba(255,255,255,0.08);
      transition: background 0.4s;
    }

    /* ── Stats ── */
    #stats {
      display: none;
      grid-template-columns: repeat(3,1fr);
      gap: 8px;
      margin-bottom: 24px;
    }
    .stat {
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 2px;
      padding: 10px 8px;
      text-align: center;
    }
    .stat-label { font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 2px; margin-bottom: 4px; }
    .stat-val   { font-size: 15px; color: #e8e8f0; font-weight: 700; }

    /* ── Checklist ── */
    #checks { display: none; margin-bottom: 24px; }
    .checks-title { font-size: 10px; color: rgba(255,255,255,0.35); letter-spacing: 3px; margin-bottom: 12px; }
    .checks-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px 12px;
    }
    .check-item { display: flex; align-items: center; gap: 8px; }
    .check-box {
      width: 14px; height: 14px; border-radius: 1px; flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      font-size: 9px; color: transparent;
      transition: all 0.3s;
    }
    .check-box.pass {
      background: rgba(0,200,151,0.13);
      border-color: var(--green);
      color: var(--green);
    }
    .check-text {
      font-size: 10px; line-height: 1.3;
      color: rgba(255,255,255,0.28);
      transition: color 0.3s;
    }
    .check-text.pass { color: rgba(255,255,255,0.7); }

    /* ── Actions ── */
    .actions { display: flex; gap: 8px; }
    #genBtn {
      flex: 1;
      background: transparent;
      border: 1px solid var(--cyan);
      color: var(--cyan);
      font-family: var(--font);
      font-size: 11px; letter-spacing: 2px;
      padding: 12px 16px;
      cursor: pointer; border-radius: 2px;
      text-transform: uppercase;
      transition: background 0.2s;
    }
    #genBtn:hover { background: rgba(0,229,255,0.08); }
    #histBtn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.4);
      font-family: var(--font);
      font-size: 11px; letter-spacing: 1px;
      padding: 12px 14px;
      cursor: pointer; border-radius: 2px;
      transition: background 0.2s;
      display: none;
    }
    #histBtn:hover { background: rgba(255,255,255,0.05); }

    /* ── Suggestion ── */
    #suggestion {
      display: none;
      margin-top: 12px;
      background: rgba(0,229,255,0.04);
      border: 1px solid rgba(0,229,255,0.2);
      border-radius: 2px;
      padding: 12px 14px;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }
    #sugText {
      color: #e8e8f0;
      font-family: var(--font);
      font-size: 13px;
      word-break: break-all;
      flex: 1;
    }
    #copyBtn {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.5);
      font-family: var(--font);
      font-size: 9px; letter-spacing: 1px;
      padding: 6px 10px;
      cursor: pointer; border-radius: 2px; flex-shrink: 0;
      transition: all 0.2s;
    }
    #copyBtn.copied {
      background: rgba(0,200,151,0.13);
      border-color: var(--green);
      color: var(--green);
    }

    /* ── History ── */
    #history { display: none; margin-top: 12px; }
    .hist-title { font-size: 10px; color: rgba(255,255,255,0.3); letter-spacing: 3px; margin-bottom: 8px; }
    .hist-list  { display: flex; flex-direction: column; gap: 4px; }
    .hist-item  {
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 2px; padding: 8px 12px; gap: 8px;
    }
    .hist-hash  { font-size: 11px; color: rgba(255,255,255,0.25); }
    .hist-label { font-size: 10px; letter-spacing: 1px; }
    .hist-segs  { display: flex; gap: 3px; }
    .hist-seg   { width: 8px; height: 8px; border-radius: 1px; background: rgba(255,255,255,0.07); }
    .hist-note  { font-size: 9px; color: rgba(255,255,255,0.2); margin-top: 6px; letter-spacing: 1px; }

    /* ── Footer ── */
    footer { margin-top: 20px; text-align: center; }
    footer p { font-size: 9px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }
  </style>
</head>
<body>
<div class="wrapper">

  <header>
    <p class="subtitle">Security Toolkit v2.4.1</p>
    <h1>PASSWORD<br><span>STRENGTH ANALYZER</span></h1>
    <div class="divider"></div>
  </header>

  <div class="card">

    <!-- Input -->
    <div class="input-wrap">
      <label class="input-label" for="pwd">ENTER PASSWORD</label>
      <input id="pwd" type="password" placeholder="Type your password…" autocomplete="new-password" />
      <button id="toggleBtn" title="Show/Hide">○</button>
    </div>

    <!-- Strength Bar -->
    <div class="bar-header">
      <span class="bar-title">STRENGTH</span>
      <span id="strengthLabel">—</span>
    </div>
    <div class="bar-track"><div id="barFill"></div></div>
    <div class="segments">
      <div class="seg" id="s1"></div>
      <div class="seg" id="s2"></div>
      <div class="seg" id="s3"></div>
      <div class="seg" id="s4"></div>
      <div class="seg" id="s5"></div>
    </div>

    <!-- Stats -->
    <div id="stats">
      <div class="stat"><div class="stat-label">LENGTH</div><div class="stat-val" id="statLen">0</div></div>
      <div class="stat"><div class="stat-label">SCORE</div><div class="stat-val" id="statScore">0/100</div></div>
      <div class="stat"><div class="stat-label">ENTROPY</div><div class="stat-val" id="statEntropy">0 bits</div></div>
    </div>

    <!-- Checklist -->
    <div id="checks">
      <div class="checks-title">REQUIREMENTS</div>
      <div class="checks-grid" id="checksGrid"></div>
    </div>

    <!-- Actions -->
    <div class="actions">
      <button id="genBtn">⚡ Generate Secure Password</button>
      <button id="histBtn">▼ HISTORY</button>
    </div>

    <!-- Suggestion -->
    <div id="suggestion">
      <span id="sugText"></span>
      <button id="copyBtn">COPY</button>
    </div>

    <!-- History -->
    <div id="history">
      <div class="hist-title">RECENT PASSWORDS (THIS SESSION)</div>
      <div class="hist-list" id="histList"></div>
      <div class="hist-note">* Passwords shown as partial fingerprint. Never stored beyond this session.</div>
    </div>

  </div>

  <footer><p>PASSWORDS ARE NEVER TRANSMITTED OR STORED · CLIENT-SIDE ONLY</p></footer>
</div>

<script>
// ── Common passwords ──────────────────────────────────────────
const COMMON = new Set([
  "password","123456","password1","12345678","qwerty","abc123","monkey",
  "1234567","letmein","trustno1","dragon","baseball","iloveyou","master",
  "sunshine","ashley","bailey","passw0rd","shadow","123123","654321",
  "superman","qazwsx","michael","football","password123","admin","welcome",
  "login","hello","charlie","donald","password2","qwerty123","test","pass",
  "1q2w3e4r","123qwe","zxcvbnm","iloveyou1"
]);

const CHECKS_CFG = [
  { key:"length8",      label:"At least 8 characters"             },
  { key:"length12",     label:"At least 12 characters"            },
  { key:"length16",     label:"16+ characters (max entropy)"      },
  { key:"upper",        label:"Uppercase letters (A–Z)"           },
  { key:"lower",        label:"Lowercase letters (a–z)"           },
  { key:"digit",        label:"Numbers (0–9)"                     },
  { key:"special",      label:"Special characters (!@#…)"         },
  { key:"noCommon",     label:"Not a common password"             },
  { key:"noRepeating",  label:"No repeating characters (aaa…)"    },
  { key:"noSequential", label:"No sequential patterns (abc,123…)" },
];

// ── Analysis ─────────────────────────────────────────────────
function analyze(pwd) {
  const len = pwd.length;
  const c = {
    length8:      len >= 8,
    length12:     len >= 12,
    length16:     len >= 16,
    upper:        /[A-Z]/.test(pwd),
    lower:        /[a-z]/.test(pwd),
    digit:        /[0-9]/.test(pwd),
    special:      /[^A-Za-z0-9]/.test(pwd),
    noCommon:     !COMMON.has(pwd.toLowerCase()),
    noRepeating:  !/(.)\1{2,}/.test(pwd),
    noSequential: !/(?:abc|bcd|cde|def|efg|fgh|ghi|hij|ijk|jkl|klm|lmn|mno|nop|opq|pqr|qrs|rst|stu|tuv|uvw|vwx|wxy|xyz|012|123|234|345|456|567|678|789)/i.test(pwd),
  };
  let score = 0;
  if (c.length8)      score += 10;
  if (c.length12)     score += 15;
  if (c.length16)     score += 10;
  if (c.upper)        score += 15;
  if (c.lower)        score += 10;
  if (c.digit)        score += 15;
  if (c.special)      score += 20;
  if (c.noCommon)     score += 5;
  if (c.noRepeating)  score += 5;
  if (c.noSequential) score += 5;
  let cs = 0;
  if (c.lower)   cs += 26;
  if (c.upper)   cs += 26;
  if (c.digit)   cs += 10;
  if (c.special) cs += 32;
  const entropy = cs > 0 ? Math.floor(len * Math.log2(cs)) : 0;
  let level, label, color;
  if (!len)          { level=0; label="—";         color="#555";     }
  else if (score<30) { level=1; label="Weak";      color="#ff3b5c";  }
  else if (score<50) { level=2; label="Fair";      color="#ff8c42";  }
  else if (score<70) { level=3; label="Good";      color="#f5c800";  }
  else if (score<85) { level=4; label="Strong";    color="#00c897";  }
  else               { level=5; label="Excellent"; color="#00e5ff";  }
  return { score, level, label, color, checks: c, entropy };
}

// ── Generator ────────────────────────────────────────────────
const POOLS = {
  lower:   "abcdefghijklmnopqrstuvwxyz",
  upper:   "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
  digit:   "0123456789",
  special: "!@#$%^&*()_+-=[]{}|;:,.<>?"
};
const ALL = Object.values(POOLS).join("");

function generate(minLen = 16) {
  const len = Math.max(16, minLen);
  let r = "";
  r += POOLS.lower  [Math.floor(Math.random() * POOLS.lower.length)];
  r += POOLS.upper  [Math.floor(Math.random() * POOLS.upper.length)];
  r += POOLS.digit  [Math.floor(Math.random() * POOLS.digit.length)];
  r += POOLS.special[Math.floor(Math.random() * POOLS.special.length)];
  for (let i = r.length; i < len; i++)
    r += ALL[Math.floor(Math.random() * ALL.length)];
  const a = r.split("");
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a.join("");
}

// ── DOM refs ─────────────────────────────────────────────────
const pwdEl       = document.getElementById("pwd");
const toggleBtn   = document.getElementById("toggleBtn");
const barFill     = document.getElementById("barFill");
const strengthLbl = document.getElementById("strengthLabel");
const segs        = [1,2,3,4,5].map(i => document.getElementById("s"+i));
const statsEl     = document.getElementById("stats");
const statLen     = document.getElementById("statLen");
const statScore   = document.getElementById("statScore");
const statEntropy = document.getElementById("statEntropy");
const checksEl    = document.getElementById("checks");
const checksGrid  = document.getElementById("checksGrid");
const genBtn      = document.getElementById("genBtn");
const histBtn     = document.getElementById("histBtn");
const sugEl       = document.getElementById("suggestion");
const sugText     = document.getElementById("sugText");
const copyBtn     = document.getElementById("copyBtn");
const histEl      = document.getElementById("history");
const histList    = document.getElementById("histList");

// ── Build checklist rows ──────────────────────────────────────
CHECKS_CFG.forEach(({ key, label }) => {
  const item = document.createElement("div");
  item.className = "check-item";
  item.innerHTML = `
    <span class="check-box" id="cb-${key}">✓</span>
    <span class="check-text" id="ct-${key}">${label}</span>`;
  checksGrid.appendChild(item);
});

// ── State ────────────────────────────────────────────────────
let showPwd     = false;
let showHist    = false;
let history     = [];
let suggestion  = "";
let copyTimer   = null;

// ── Toggle show/hide ─────────────────────────────────────────
toggleBtn.addEventListener("click", () => {
  showPwd = !showPwd;
  pwdEl.type = showPwd ? "text" : "password";
  pwdEl.style.letterSpacing = showPwd ? "0" : "3px";
  toggleBtn.textContent = showPwd ? "●" : "○";
});

// ── Main input handler ────────────────────────────────────────
pwdEl.addEventListener("input", () => {
  const pwd = pwdEl.value;
  const a   = analyze(pwd);

  // Border colour
  pwdEl.style.borderColor = pwd ? a.color + "60" : "rgba(255,255,255,0.1)";

  // Strength bar
  barFill.style.width      = `${(a.level / 5) * 100}%`;
  barFill.style.background = a.color;
  barFill.style.boxShadow  = pwd ? `0 0 12px ${a.color}80` : "none";
  strengthLbl.textContent  = a.label;
  strengthLbl.style.color  = a.color;

  // Segments
  segs.forEach((s, i) => {
    s.style.background = a.level >= i + 1 ? a.color : "rgba(255,255,255,0.08)";
  });

  // Stats
  if (pwd) {
    statsEl.style.display   = "grid";
    statLen.textContent     = pwd.length;
    statScore.textContent   = `${a.score}/100`;
    statEntropy.textContent = `~${a.entropy} bits`;
  } else {
    statsEl.style.display = "none";
  }

  // Checks
  if (pwd) {
    checksEl.style.display = "block";
    CHECKS_CFG.forEach(({ key }) => {
      const box  = document.getElementById("cb-" + key);
      const text = document.getElementById("ct-" + key);
      if (a.checks[key]) {
        box.classList.add("pass");
        text.classList.add("pass");
      } else {
        box.classList.remove("pass");
        text.classList.remove("pass");
      }
    });
  } else {
    checksEl.style.display = "none";
  }

  // Update history
  if (pwd && !history.find(h => h.raw === pwd)) {
    history = [{ raw: pwd, hash: btoa(pwd).slice(0,8)+"…", level: a.level, label: a.label, color: a.color }, ...history].slice(0, 5);
    renderHistory();
    if (history.length > 0) histBtn.style.display = "block";
  }
});

// ── Generate ──────────────────────────────────────────────────
genBtn.addEventListener("click", () => {
  const pwd = pwdEl.value;
  suggestion = generate(Math.max(16, pwd.length + 4));
  sugText.textContent    = suggestion;
  sugEl.style.display    = "flex";
  copyBtn.textContent    = "COPY";
  copyBtn.classList.remove("copied");
});

// ── Copy ─────────────────────────────────────────────────────
copyBtn.addEventListener("click", () => {
  navigator.clipboard.writeText(suggestion).catch(() => {});
  copyBtn.textContent = "✓ COPIED";
  copyBtn.classList.add("copied");
  clearTimeout(copyTimer);
  copyTimer = setTimeout(() => {
    copyBtn.textContent = "COPY";
    copyBtn.classList.remove("copied");
  }, 2000);
});

// ── History toggle ────────────────────────────────────────────
histBtn.addEventListener("click", () => {
  showHist = !showHist;
  histEl.style.display   = showHist ? "block" : "none";
  histBtn.textContent    = (showHist ? "▲" : "▼") + " HISTORY";
});

function renderHistory() {
  histList.innerHTML = "";
  history.forEach(h => {
    const item = document.createElement("div");
    item.className = "hist-item";
    const segsHTML = [1,2,3,4,5].map(s =>
      `<div class="hist-seg" style="background:${h.level>=s?h.color:'rgba(255,255,255,0.07)'}"></div>`
    ).join("");
    item.innerHTML = `
      <span class="hist-hash">${h.hash}</span>
      <span class="hist-label" style="color:${h.color}">${h.label}</span>
      <div class="hist-segs">${segsHTML}</div>`;
    histList.appendChild(item);
  });
}
</script>
</body>
</html>
